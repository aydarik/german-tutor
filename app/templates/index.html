<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Tutor - Flashcards</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇩🇪</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap"
          rel="stylesheet">
</head>
<body>
<div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<main class="container">
    <header>
        <h1>Deutsch <span class="accent">Lernen</span></h1>
        <div id="stats" class="stats">
            <span id="word-count">Loading...</span> words left
        </div>
    </header>

    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <section id="card-container" class="card-wrapper">
        <div id="card" class="card">
            <div class="card-content">
                <div id="direction-label" class="label"></div>
                <div id="question" class="question">Wort...</div>
                <div id="example-container" class="example-box hidden">
                    <p class="example-label">Beispiel:</p>
                    <p id="example-text"></p>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="answer-input" placeholder="Übersetzung eingeben..." autocomplete="off">
                        <div id="suggestions" class="suggestions-dropdown hidden"></div>
                    </div>
                    <button id="check-btn" class="primary-btn">Check</button>
                </div>

                <div id="feedback" class="feedback-area hidden">
                    <div id="feedback-message"></div>
                    <div id="correct-answer" class="correct-answer"></div>
                    <div class="action-buttons">
                        <button id="next-btn" class="secondary-btn">Next Word</button>
                        <button id="mark-btn" class="success-btn hidden">Mark as Learned</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="/static/script.js"></script>
</body>
</html>
